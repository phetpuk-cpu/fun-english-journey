<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตรวจเสียง Phonics — Fun English Journey (หน้าภายใน)</title>
<style>
body{font-family:'Mali',sans-serif;background:#EAF6FF;color:#1D3557;margin:0;padding:16px;}
h1{font-size:1.3rem} h2{font-size:1.05rem;margin:18px 0 6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
.cell{background:#fff;border-radius:10px;padding:8px;display:flex;flex-direction:column;gap:4px;box-shadow:0 2px 6px rgba(29,53,87,.08);}
.cell b{font-size:1rem}
button{font-family:inherit;border:none;border-radius:8px;padding:6px 8px;cursor:pointer;background:#2E90FA;color:#fff;font-size:.85rem;}
button.sound{background:#7c5fc4} button.word{background:#2a9d5c}
.hint{font-size:.85rem;color:#57678a}
.expected{font-size:.8rem;color:#57678a}
</style></head><body>
<h1>🎧 หน้าไล่ฟังตรวจเสียง Phonics (สำหรับทีมงาน ไม่ลิงก์จากแอป)</h1>
<p class="hint">กดฟังทีละปุ่ม เทียบกับ "ที่ควรได้ยิน" — ปุ่ม <b>ชื่อ</b> ต้องเป็นชื่อตัวอักษร (บี), ปุ่ม <b>เสียง</b> ต้องเป็น phoneme สั้นๆ (บึ), ปุ่ม <b>คำ</b> ต้องเป็นคำศัพท์</p>
<h2>ตัวอักษร a-z (26 × 3 ไฟล์)</h2>
<div class="grid" id="letters"></div>
<h2>คำ CVC (30 ไฟล์)</h2>
<div class="grid" id="cvc"></div>
<script>
const NAMES={a:"เอ",b:"บี",c:"ซี",d:"ดี",e:"อี",f:"เอฟ",g:"จี",h:"เอช",i:"ไอ",j:"เจ",k:"เค",l:"แอล",m:"เอ็ม",n:"เอ็น",o:"โอ",p:"พี",q:"คิว",r:"อาร์",s:"เอส",t:"ที",u:"ยู",v:"วี",w:"ดับเบิลยู",x:"เอกซ์",y:"วาย",z:"ซี"};
const WORDS={a:"apple",b:"ball",c:"cat",d:"dog",e:"egg",f:"fish",g:"goat",h:"hat",i:"insect",j:"jam",k:"kite",l:"lion",m:"monkey",n:"nose",o:"octopus",p:"pig",q:"queen",r:"rabbit",s:"sun",t:"tiger",u:"umbrella",v:"van",w:"worm",x:"fox",y:"yo-yo",z:"zebra"};
const CVC=["cat","bat","rat","hat","mat","sat","man","fan","pan","van","cap","map","nap","tap","pig","wig","dig","dog","log","bug","hug","rug","net","jet","vet","wet","hen","pen","bed","red"];
let cur=null;
function play(f){ if(cur){cur.pause();} cur=new Audio("assets/audio/"+f); cur.play(); }
document.getElementById("letters").innerHTML=Object.keys(NAMES).map(l=>`
  <div class="cell"><b>${l.toUpperCase()} ${l}</b>
    <button onclick="play('phonics-${l}-name.mp3')">🔊 ชื่อ</button>
    <button class="sound" onclick="play('phonics-${l}-sound.mp3')">🗣️ เสียง</button>
    <button class="word" onclick="play('phonics-${l}-word.mp3')">🔊 ${WORDS[l]}</button>
    <span class="expected">ควรได้ยิน: ${NAMES[l]} / phoneme สั้น / ${WORDS[l]}</span>
  </div>`).join("");
document.getElementById("cvc").innerHTML=CVC.map(w=>`
  <div class="cell"><b>${w}</b><button class="word" onclick="play('phonics-cvc-${w}.mp3')">🔊 ฟัง</button></div>`).join("");
</script></body></html>
