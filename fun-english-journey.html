<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fun English Journey 🦆</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#EAF6FF; --ink:#1D3557; --blue:#2E90FA; --duck:#FFC93C;
  --coral:#FF6B6B; --green:#34C77B; --purple:#9B7EDE; --white:#FFFFFF;
  --shadow:0 4px 0 rgba(29,53,87,.15);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{margin:0; font-family:'Mali','Comic Sans MS',sans-serif; background:var(--sky); color:var(--ink); min-height:100vh;}
.screen{display:none; max-width:520px; margin:0 auto; padding:16px 16px 90px; min-height:100vh;}
.screen.active{display:block; animation:pop .3s ease;}
@keyframes pop{from{opacity:0; transform:scale(.97);} to{opacity:1; transform:scale(1);}}
h1,h2{font-family:'Baloo 2','Mali',sans-serif;}
h1{font-size:1.9rem; margin:.4em 0;}
h2{font-size:1.4rem; margin:.4em 0;}
.center{text-align:center;}
.btn{font-family:inherit; font-size:1.1rem; font-weight:700; border:none; border-radius:20px;
  padding:14px 22px; cursor:pointer; box-shadow:var(--shadow); transition:transform .1s; color:var(--white); background:var(--blue); width:100%; margin:6px 0;}
.btn:active{transform:translateY(3px); box-shadow:0 1px 0 rgba(29,53,87,.15);}
.btn.yellow{background:var(--duck); color:var(--ink);}
.btn.green{background:var(--green);}
.btn.ghost{background:var(--white); color:var(--ink);}
.card{background:var(--white); border-radius:24px; padding:18px; margin:12px 0; box-shadow:var(--shadow);}
.mascot{font-size:3.4rem; line-height:1;}
.bubble{background:var(--white); border-radius:20px; padding:12px 16px; margin:8px 0; box-shadow:var(--shadow);}
.bubble .th{font-size:.85rem; color:#6b7a99; margin-top:4px;}
.topbar{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
.topbar .back{font-size:1.5rem; background:var(--white); border:none; border-radius:14px; width:44px; height:44px; cursor:pointer; box-shadow:var(--shadow);}
.progress-track{flex:1; background:var(--white); border-radius:99px; height:16px; overflow:hidden; box-shadow:inset 0 2px 4px rgba(29,53,87,.1);}
.progress-fill{height:100%; width:0%; background:linear-gradient(90deg,var(--duck),var(--green)); border-radius:99px; transition:width .4s;}
.xp-pill{background:var(--white); border-radius:99px; padding:6px 12px; font-weight:700; box-shadow:var(--shadow); white-space:nowrap;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.vocab-card{background:var(--white); border-radius:20px; padding:14px 8px; text-align:center; box-shadow:var(--shadow);}
.vocab-card .emoji{font-size:2.6rem;}
.vocab-card .word{font-family:'Baloo 2'; font-size:1.05rem; font-weight:800; margin:4px 0 0;}
.vocab-card .th{font-size:.9rem; color:#6b7a99;}
.sound-row{display:flex; gap:6px; justify-content:center; margin-top:8px;}
.sound-btn{border:none; border-radius:12px; padding:6px 10px; font-family:inherit; font-weight:700; cursor:pointer; box-shadow:var(--shadow);}
.sound-btn.en{background:var(--blue); color:#fff;}
.sound-btn.th{background:#FFE8B3; color:var(--ink);}
.choice{background:var(--white); border:3px solid transparent; border-radius:20px; padding:14px; font-size:1.05rem; font-family:inherit; font-weight:600; cursor:pointer; box-shadow:var(--shadow); width:100%; margin:6px 0; text-align:left; color:var(--ink);}
.choice.correct{border-color:var(--green); background:#E9FBF2;}
.choice.wrong{border-color:var(--coral); background:#FFECEC; animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
.match-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.match-item{background:var(--white); border:3px solid transparent; border-radius:18px; padding:14px 6px; text-align:center; font-size:.98rem; font-weight:700; cursor:pointer; box-shadow:var(--shadow); font-family:'Baloo 2';}
.match-item .big{font-size:2rem; display:block;}
.match-item.selected{border-color:var(--blue); background:#EAF2FF;}
.match-item.done{opacity:.35; pointer-events:none; border-color:var(--green);}
.pick-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.pick-item{background:var(--white); border:3px solid transparent; border-radius:18px; padding:16px; text-align:center; font-size:2.4rem; cursor:pointer; box-shadow:var(--shadow);}
.pick-item.correct{border-color:var(--green); background:#E9FBF2;}
.pick-item.wrong{border-color:var(--coral); background:#FFECEC; animation:shake .3s;}
.chip-zone{min-height:56px; background:#F2F7FF; border:2px dashed #B9D4F5; border-radius:16px; padding:8px; display:flex; flex-wrap:wrap; gap:6px; margin:8px 0;}
.chip{background:var(--white); border:none; border-radius:12px; padding:8px 14px; font-family:'Baloo 2'; font-size:1.02rem; font-weight:800; cursor:pointer; box-shadow:var(--shadow); color:var(--ink);}
.chip.in-answer{background:var(--duck);}
.rec-row{display:flex; gap:8px; justify-content:center; align-items:center; flex-wrap:wrap; margin:10px 0;}
.mic-btn{width:96px; height:96px; border-radius:50%; border:none; background:var(--coral); color:#fff; font-size:2.6rem; cursor:pointer; box-shadow:0 6px 0 #d94f4f; transition:transform .1s;}
.mic-btn:active{transform:translateY(4px); box-shadow:0 2px 0 #d94f4f;}
.mic-btn.listening{background:var(--green); box-shadow:0 6px 0 #22935a; animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.play-self{border:none; border-radius:16px; padding:10px 14px; font-family:inherit; font-weight:700; cursor:pointer; box-shadow:var(--shadow); background:var(--purple); color:#fff; display:none;}
.stars{font-size:2.2rem; letter-spacing:6px;}
.target-sentence{font-family:'Baloo 2'; font-size:1.4rem; font-weight:800; color:var(--blue);}
.badge-pop{font-size:4rem; animation:bounce .6s;}
@keyframes bounce{0%{transform:scale(0);}60%{transform:scale(1.2);}100%{transform:scale(1);}}
.lesson-node{display:flex; align-items:center; gap:12px; background:var(--white); border-radius:20px; padding:12px 14px; margin:8px 0; box-shadow:var(--shadow); cursor:pointer; border:none; width:100%; font-family:inherit; text-align:left;}
.lesson-node .icon{font-size:1.8rem;}
.lesson-node .info{flex:1;}
.lesson-node .name{font-weight:700; font-size:1rem; color:var(--ink);}
.lesson-node .sub{font-size:.8rem; color:#6b7a99;}
.unit-head{font-weight:700; margin:14px 0 4px; font-size:1.05rem;}
.note{font-size:.8rem; color:#6b7a99; text-align:center; margin-top:14px;}
.feedback{min-height:34px; text-align:center; font-weight:700; font-size:1.05rem;}
input.name-input{width:100%; font-family:inherit; font-size:1.2rem; padding:12px 16px; border-radius:16px; border:3px solid var(--duck); outline:none; text-align:center;}
.avatar-row{display:flex; gap:8px; justify-content:center; margin:10px 0;}
.avatar{font-size:2.2rem; background:var(--white); border:3px solid transparent; border-radius:16px; padding:8px; cursor:pointer; box-shadow:var(--shadow);}
.avatar.selected{border-color:var(--blue); background:#EAF2FF;}
.step-label{font-size:.8rem; color:#6b7a99; text-align:center; margin-bottom:4px;}
.tab-row{display:flex; gap:8px; margin:10px 0;}
.tab{flex:1; border:none; border-radius:16px; padding:10px; font-family:inherit; font-weight:700; font-size:1.05rem; cursor:pointer; box-shadow:var(--shadow); background:var(--white); color:var(--ink);}
.tab.active{background:var(--blue); color:#fff;}
</style>
</head>
<body>

<!-- ============ SCREEN: WELCOME ============ -->
<div class="screen active" id="scr-welcome">
  <div class="center" style="margin-top:40px">
    <div class="mascot">🦆</div>
    <h1>Fun English Journey</h1>
    <p>เรียนอังกฤษกับ Ducky และผองเพื่อน!</p>
  </div>
  <div class="card">
    <p style="margin:0 0 6px"><b>ชื่อเล่นของหนูคืออะไร?</b></p>
    <input class="name-input" id="inp-name" maxlength="12" placeholder="พิมพ์ชื่อเล่น">
    <p style="margin:14px 0 4px"><b>เลือกตัวแทนของหนู</b></p>
    <div class="avatar-row" id="avatar-row">
      <button class="avatar selected">🦁</button><button class="avatar">🐼</button>
      <button class="avatar">🦊</button><button class="avatar">🐸</button><button class="avatar">🦄</button>
    </div>
    <button class="btn yellow" onclick="startApp()">เริ่มผจญภัย! 🚀</button>
  </div>
  <p class="note">เวอร์ชันต้นแบบ — คะแนนยังไม่ถูกบันทึกถาวร</p>
</div>

<!-- ============ SCREEN: MAP ============ -->
<div class="screen" id="scr-map">
  <div class="topbar">
    <span class="mascot" style="font-size:2rem" id="map-avatar">🦁</span>
    <div style="flex:1"><b id="map-name">เพื่อน</b><div style="font-size:.8rem;color:#6b7a99">นักผจญภัยฝึกหัด</div></div>
    <span class="xp-pill">💎 <span id="xp-total">0</span> XP</span>
  </div>
  <div class="tab-row">
    <button class="tab active" data-g="p3">🏙️ ป.3</button>
    <button class="tab" data-g="p4">🎪 ป.4</button>
  </div>
  <div id="map-list"></div>
</div>

<!-- ============ SCREEN: LESSON ============ -->
<div class="screen" id="scr-lesson">
  <div class="topbar">
    <button class="back" onclick="goMap()">🏠</button>
    <div class="progress-track"><div class="progress-fill" id="lesson-progress"></div></div>
    <span class="xp-pill">💎 <span id="xp-lesson">0</span></span>
  </div>
  <div class="step-label" id="step-label"></div>
  <div id="stage"></div>
</div>

/* ================= STATE (in-memory) ================= */
const state = {name:"เพื่อน", avatar:"🦁", xp:0, grade:"p3", lessonId:null, step:0, lessonXp:0, stars:{}};
function getLesson(id){
  for(const g of Object.values(CONTENT))
    for(const u of g.units)
      for(const l of u.lessons)
        if(l.id===id) return l;
}
function nextLessonId(id){
  const flat = [];
  for(const g of Object.values(CONTENT)) for(const u of g.units) for(const l of u.lessons) flat.push(l.id);
  const i = flat.indexOf(id);
  /* บทถัดไปเฉพาะภายในชั้นเดียวกัน (p3.. / p4..) */
  if(i>=0 && i<flat.length-1 && flat[i+1].slice(0,2)===id.slice(0,2)) return flat[i+1];
  return null;
}

/* ================= AUDIO (TTS placeholder until real voice files) ================= */
function speak(text, lang){
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = lang.startsWith("en") ? 0.75 : 0.65;
    const voices = speechSynthesis.getVoices();
    const v = voices.find(v=>v.lang && v.lang.startsWith(lang.split("-")[0]));
    if(v) u.voice = v;
    speechSynthesis.speak(u);
  }catch(e){}
}
if("speechSynthesis" in window){
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = ()=>speechSynthesis.getVoices();
}
document.addEventListener("click", e=>{
  const b = e.target.closest("[data-say]");
  if(b) speak(b.dataset.say, b.dataset.lang || "en-US");
});

let steps = [];
function startLesson(id){
  state.lessonId = id; state.lessonXp = 0;
  const L = getLesson(id);
  const listenTargets = [...L.vocab].sort(()=>Math.random()-.5).slice(0,3);
  steps = [
    {type:"intro"},
    {type:"vocab"},
    ...listenTargets.map(v=>({type:"listen", item:v})),
    {type:"match"},
    {type:"build"},
    ...L.speak.map((s,i)=>({type:"speak", idx:i})),
    ...L.quiz.map((q,i)=>({type:"quiz", idx:i})),
    {type:"result"},
  ];
  state.step = 0;
  show("scr-lesson");
  render();
}
function addXp(n){ state.lessonXp += n; document.getElementById("xp-lesson").textContent = state.lessonXp; }
function next(){ stopAllAudio(); state.step++; render(); }
function stepLabel(){
  const t = steps[state.step].type;

}

/* ================= SPEECH: อัดเสียง + ถอดเสียง + ฟังเทียบ ================= */
let currentAudio = null, mediaStream = null;
function stopAllAudio(){
  if(currentAudio){ currentAudio.pause(); currentAudio = null; }
  if(mediaStream){ mediaStream.getTracks().forEach(t=>t.stop()); mediaStream = null; }
}
function similarity(a,b){
  const norm = s => s.toLowerCase().replace(/[^a-z ]/g,"").split(/\s+/).filter(Boolean);
  const ta = norm(a), tb = norm(b);
  if(!ta.length) return 0;
  let hit = 0;
  ta.forEach(w=>{ if(tb.includes(w)) hit++; });
  return Math.round(hit/ta.length*100);
}
function setupSpeech(target){
  const mic = document.getElementById("mic");
  const fb = document.getElementById("speak-fb");
  const starEl = document.getElementById("speak-stars");
  const skip = document.getElementById("speak-skip");
  const playSelf = document.getElementById("play-self");
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const canRecord = navigator.mediaDevices && window.MediaRecorder;
  let myVoiceUrl = null, recorder = null, chunks = [], rec = null, busy = false;

  playSelf.onclick = ()=>{
    if(!myVoiceUrl) return;
    speechSynthesis.cancel();
    if(currentAudio) currentAudio.pause();
    currentAudio = new Audio(myVoiceUrl);
    currentAudio.play();
  };

  function finishScore(best, heard){
    const stars = best>=80?3:best>=50?2:1;
    starEl.textContent = "⭐".repeat(stars)+"☆".repeat(3-stars);
    if(best>=80){ fb.innerHTML = `🌟 Excellent! <b>${best} คะแนน</b><br>กด ▶️ ฟังเสียงตัวเองเทียบกับต้นแบบได้เลย`; addXp(10); }
    else if(best>=50){ fb.innerHTML = `👍 Good! <b>${best} คะแนน</b> (ได้ยิน: "${heard}")<br>ฟังเทียบแล้วลองอัดใหม่ได้นะ`; addXp(6); }
    else { fb.innerHTML = `💪 ลองอีกครั้งนะ (ได้ยิน: "${heard||"—"}")<br>กด 🔊 ต้นแบบ ฟังช้าๆ ก่อน`; }
    skip.style.display="block";
  }

  async function startRecording(){
    if(busy) return;
    busy = true;
    speechSynthesis.cancel();
    chunks = []; myVoiceUrl = null; playSelf.style.display="none";

    if(canRecord){
      try{
        mediaStream = await navigator.mediaDevices.getUserMedia({audio:true});
        recorder = new MediaRecorder(mediaStream);
        recorder.ondataavailable = e=>{ if(e.data.size) chunks.push(e.data); };
        recorder.onstop = ()=>{
          if(chunks.length){
            myVoiceUrl = URL.createObjectURL(new Blob(chunks));
            playSelf.style.display="inline-block";
            fb.innerHTML += "<br>💾 อัดเสียงแล้ว! กด ▶️ ฟังได้เลย";
          }
          if(mediaStream){ mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
        };
        recorder.start();
      }catch(e){
        fb.textContent = "เปิดไมค์ไม่ได้ ตรวจสอบการอนุญาตไมโครโฟนนะครับ 🙏";
        busy = false; skip.style.display="block"; return;
      }
    }
    mic.classList.add("listening");
    fb.textContent = "🔴 กำลังอัด... พูดเลย!";

    if(SR){
      rec = new SR();
      rec.lang = "en-US"; rec.interimResults = false; rec.maxAlternatives = 3;
      rec.onresult = ev=>{
        let best = 0, heard = "";
        for(const alt of ev.results[0]){
          const s = similarity(target, alt.transcript);
          if(s > best){ best = s; heard = alt.transcript; }
        }
        finishScore(best, heard);
      };
      rec.onerror = ()=>{ fb.textContent = "ไม่ได้ยินชัด ลองพูดดังๆ ใกล้ไมค์นะ 🎙️"; skip.style.display="block"; };
      rec.onend = ()=> stopRecording();
      try{ rec.start(); }catch(e){}
      setTimeout(()=>{ if(busy) stopRecording(); }, 6000);
    }else{
      fb.textContent = "🔴 กำลังอัด 4 วินาที... พูดเลย!";
      setTimeout(()=>{
        stopRecording();
        fb.innerHTML = "อุปกรณ์นี้ให้คะแนนอัตโนมัติไม่ได้ 🙏<br>กด ▶️ ฟังเสียงตัวเอง เทียบกับ 🔊 ต้นแบบดูนะ";
        addXp(6); skip.style.display="block";
      }, 4000);
    }
  }
  function stopRecording(){
    busy = false;
    mic.classList.remove("listening");
    if(rec){ try{ rec.stop(); }catch(e){} rec = null; }
    if(recorder && recorder.state !== "inactive") recorder.stop();
  }
  mic.onclick = ()=>{ busy ? stopRecording() : startRecording(); };
}
</script>
